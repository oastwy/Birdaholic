name: bird_flashcard
description: 鸟鸣闪卡学习工具
version: 1.4.9+52

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  archive: ^4.0.0
  file_picker: ^11.0.0
  http: ^1.2.0
  geolocator: ^13.0.4
  url_launcher: ^6.3.0
  wakelock_plus: ^1.4.0
  lpinyin: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/avilist_species.json
    - assets/data/ebird_sample_checklist.csv
    - assets/data/china_birds.json
    - assets/data/china_birds_zheng.json
    - assets/data/china_common_100.json
    - assets/data/world_birds.json
    - assets/brand/birdaholic_logo.png
    - assets/sounds/complete.m4a
    - data_packs/china_common_100_v1.0_opt.zip
