name: bird_survey_app
description: 中国鸟类调查App - 基于eBird API和中国鸟类名录
publish_to: 'none'
version: 1.0.6+6

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.0
  permission_handler: ^11.3.0
  http: ^1.2.0
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  speech_to_text: ^7.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  file_picker: ^8.1.7
  lpinyin: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/chinese_birds.json
